<svg xmlns="http://www.w3.org/2000/svg" width="220" height="56" viewBox="0 0 220 56" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">HBnB - HomeBnb</title>
  <desc id="logoDesc">Logo with a home icon and the HBnB wordmark</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#0066d6" />
      <stop offset="100%" stop-color="#00a0ff" />
    </linearGradient>
  </defs>
  <!-- rounded rect background -->
  <rect rx="10" width="220" height="56" fill="url(#g)" />
  <!-- simple house icon -->
  <g transform="translate(14,10)" fill="#fff">
    <polygon points="12,0 24,10 24,28 0,28 0,10" />
    <rect x="7" y="12" width="6" height="8" fill="#0066d6" />
  </g>
  <!-- wordmark -->
  <text x="58" y="36" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="700" font-size="20" fill="#ffffff">HBnB</text>
</svg>
