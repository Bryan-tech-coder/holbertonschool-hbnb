<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBnB - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="icon" href="images/logo.png">
</head>

<body class="login-page">
  <header>
    <nav class="navbar">
      <img src="images/logo.png" alt="HBnB logo" class="logo">
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html" class="login-button">Login</a>
      </div>
    </nav>
  </header>

  <main class="login-main">
    <!-- Hero image for login page -->
    <section class="hero hero-login">
      <div class="hero-text">
        <h1>Sign in to HBnB</h1>
        <p>Access your account and discover unique places to stay.</p>
      </div>
    </section>
    <!-- Login form, centered and modern -->
    <form id="login-form" class="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" required placeholder="Enter your email">
      <label for="password">Password</label>
      <input type="password" id="password" required placeholder="Enter your password">
      <button type="submit">Login</button>
      <div id="login-message" style="color:red; margin-top:10px;"></div>
    </form>
  </main>

  <footer>© 2026 HBnB. All rights reserved.</footer>
  <script src="scripts.js"></script>
</body>
</html>
